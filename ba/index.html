<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Highdent – Bestandsaufnahme</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f3ec;--bg2:#ede8de;--bg3:#e4ddd0;--card:#fffdf9;--gd:#8b7340;--gd2:#a08650;--gl:#c4a855;--td:#2c2418;--tm:#5a4e3a;--ts:#998d78;--br:rgba(139,115,64,.12);--br2:rgba(139,115,64,.2);--grn:#5a8a4a;--red:#b34040;--blu:#4a6e8a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--td);min-height:100dvh}
::selection{background:rgba(196,168,85,.25)}
.hdr{background:var(--card);border-bottom:1px solid var(--br);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gd);letter-spacing:2px}
.logo small{font-family:'Jost',sans-serif;font-size:10px;color:var(--ts);letter-spacing:.5px;display:block;font-weight:400}
.hbtns{display:flex;gap:5px}
.btn{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;transition:all .12s;touch-action:manipulation}
.btn-g{background:var(--gd);color:#fff}.btn-g:active{background:var(--gd2)}
.btn-o{background:transparent;border:1px solid var(--br2);color:var(--tm)}.btn-o:active{background:var(--bg2)}
.btn-s{padding:5px 10px;font-size:12px}.btn-r{background:var(--red);color:#fff}
.pstrip{background:var(--card);border-bottom:1px solid var(--br);padding:8px 20px;display:flex;align-items:center;gap:10px}
.pbar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--gl),var(--grn));border-radius:3px;transition:width .4s}
.ptxt{font-size:11px;color:var(--ts);font-weight:500}
.tabs{display:flex;gap:4px;padding:10px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg)}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--tm);border:1px solid var(--br);touch-action:manipulation;flex-shrink:0}
.tab.act{background:var(--gd);color:#fff;border-color:var(--gd)}
.tab.done{color:var(--grn);border-color:rgba(90,138,74,.2)}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.dot.dg{background:var(--grn)}.dot.dy{background:var(--gl)}.dot.de{background:var(--bg3)}
.cnt{padding:16px 20px;max-width:860px;margin:0 auto}
.stit{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--gd);margin-bottom:12px}
.card{background:var(--card);border:1px solid var(--br);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.card.starred{border-left:3px solid var(--gl)}.card.st-ok{border-left:3px solid var(--grn)}.card.st-teilweise{border-left:3px solid var(--gl)}.card.st-fehlt{border-left:3px solid var(--red)}
.card-top{padding:12px 14px;display:flex;align-items:flex-start;gap:8px}
.card-star{font-size:16px;cursor:pointer;touch-action:manipulation;opacity:.25;transition:all .1s;flex-shrink:0;padding:2px}
.card-star.on{opacity:1}
.card-main{flex:1;min-width:0}
.card-label{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:6px}
.card-input{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fi{border:1px solid var(--br2);border-radius:6px;padding:7px 10px;font-family:'Jost',sans-serif;font-size:13px;background:var(--bg);color:var(--td);outline:none}
.fi:focus{border-color:var(--gd);background:var(--card)}
.fi-num{width:70px;text-align:center}.fi-txt{flex:1;min-width:120px}
.fi-note{width:100%;margin-top:6px;min-height:36px;resize:none;line-height:1.4}
.chips{display:flex;gap:3px;flex-shrink:0}
.ch{padding:5px 9px;border-radius:12px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--br);background:var(--card);color:var(--ts);transition:all .1s;touch-action:manipulation}
.ch:active{transform:scale(.94)}
.ch.c-ok{background:rgba(90,138,74,.1);color:var(--grn);border-color:rgba(90,138,74,.25)}
.ch.c-tl{background:rgba(196,168,85,.1);color:var(--gd);border-color:rgba(196,168,85,.25)}
.ch.c-fl{background:rgba(179,64,64,.08);color:var(--red);border-color:rgba(179,64,64,.2)}
.ch.c-na{background:var(--bg2);color:var(--ts);border-color:var(--br2)}
.photos{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.phthumb{width:56px;height:56px;border-radius:5px;object-fit:cover;border:1px solid var(--br);cursor:pointer}
.phadd{width:40px;height:40px;border-radius:5px;border:1.5px dashed var(--br2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ts);cursor:pointer;background:var(--bg);touch-action:manipulation;flex-shrink:0}
.phadd:active{background:var(--bg2)}
/* Dropdown tags */
.tag-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500;background:rgba(139,115,64,.08);color:var(--gd);border:1px solid var(--br2)}
.tag .tx{cursor:pointer;font-size:14px;color:var(--ts)}
.tag .tx:active{color:var(--red)}
.dd-wrap{position:relative}
.dd-opts{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--br2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.08);max-height:200px;overflow-y:auto;z-index:30;display:none;margin-top:2px}
.dd-opts.open{display:block}
.dd-opt{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--br)}
.dd-opt:hover,.dd-opt:active{background:var(--bg2)}
.dd-opt:last-child{border-bottom:none}
.dd-opt.sel{color:var(--grn);font-weight:500}
/* Info grid */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}.ig.t3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:9px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:1.5px}
.nav{display:flex;justify-content:space-between;margin-top:16px;padding-bottom:24px}
/* ═══ WOW SUMMARY ═══ */
.sum-hero{background:linear-gradient(135deg,#2c2418 0%,#5a4e3a 50%,#8b7340 100%);border-radius:16px;padding:28px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.sum-hero::before{content:'';position:absolute;top:-40%;right:-20%;width:300px;height:300px;border-radius:50%;background:rgba(196,168,85,.12)}
.sum-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:200px;height:200px;border-radius:50%;background:rgba(196,168,85,.08)}
.sum-hero *{position:relative;z-index:1}
.sum-hero-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;margin-bottom:2px}
.sum-hero-sub{font-size:12px;opacity:.7;margin-bottom:18px}
.sum-ring-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.sum-ring{text-align:center}
.ring-svg{width:90px;height:90px}
.ring-bg{fill:none;stroke:rgba(255,255,255,.12);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease;transform-origin:center;transform:rotate(-90deg)}
.ring-label{font-size:10px;opacity:.6;margin-top:4px}
.ring-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700}
/* Section score bars */
.sec-score{background:var(--card);border:1px solid var(--br);border-radius:10px;padding:14px 16px;margin-bottom:8px}
.sec-score-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sec-score-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--gd)}
.sec-score-pct{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700}
.sec-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.sec-bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.sec-score-detail{display:flex;gap:10px;font-size:11px;margin-top:6px;color:var(--ts)}
/* Priority card */
.prio-card{background:linear-gradient(135deg,rgba(196,168,85,.06),rgba(196,168,85,.14));border:1px solid rgba(196,168,85,.25);border-radius:12px;padding:18px;margin-bottom:14px}
.prio-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gd);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.prio-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:var(--card);border-radius:8px;border:1px solid var(--br);margin-bottom:6px}
.prio-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.prio-dot.g{background:var(--grn)}.prio-dot.y{background:var(--gl)}.prio-dot.r{background:var(--red)}.prio-dot.x{background:var(--bg3)}
.prio-txt{flex:1;font-size:13px;line-height:1.5}
.prio-txt strong{color:var(--gd)}
/* Findings */
.find-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.find-card{background:var(--card);border-radius:10px;border:1px solid var(--br);padding:14px;text-align:center;position:relative;overflow:hidden}
.find-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.find-card.fc-g::before{background:var(--grn)}.find-card.fc-y::before{background:var(--gl)}.find-card.fc-r::before{background:var(--red)}.find-card.fc-x::before{background:var(--bg3)}
.find-num{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700}
.find-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ts);margin-top:2px}
/* Home */
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;padding:36px 20px}
.home-t{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--gd);margin-bottom:4px}
.home-d{font-size:13px;color:var(--ts);max-width:360px;line-height:1.6;margin-bottom:20px}
.slist{width:100%;max-width:480px;margin-top:16px}
.si{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--card);border:1px solid var(--br);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:all .12s}
.si:active{background:var(--bg2);border-color:var(--gd)}
/* Modal / Photo viewer */
.mo{display:none;position:fixed;inset:0;background:rgba(44,36,24,.45);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:14px}
.mo.open{display:flex}
.mbox{background:var(--card);border-radius:12px;padding:20px;width:500px;max-width:100%;max-height:85vh;overflow-y:auto;border:1px solid var(--br)}
.mbox h2{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--gd);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--br)}
.pv{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:150;display:none;align-items:center;justify-content:center;padding:16px}
.pv.open{display:flex}
.pv img{max-width:92%;max-height:82vh;border-radius:6px}
.pv .x{position:absolute;top:14px;right:18px;color:#fff;font-size:26px;cursor:pointer}
.pv .del{position:absolute;bottom:18px;right:18px}
/* Settings */
.set-item{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.set-item input{flex:1}
.notif{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gd);color:#fff;padding:9px 16px;border-radius:7px;font-size:13px;z-index:200;opacity:0;transition:all .3s;max-width:320px;text-align:center}
.notif.show{transform:translateX(-50%) translateY(0);opacity:1}
/* Compare */
.cr{display:grid;grid-template-columns:2fr 1fr 1fr;border-bottom:1px solid var(--br);font-size:11px}
.cr.ch2{background:var(--bg2);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--gd)}
.cc{padding:6px 8px;border-right:1px solid var(--br)}.cc:last-child{border-right:none}
@media(max-width:640px){.find-grid{grid-template-columns:1fr 1fr}.ig,.ig.t3{grid-template-columns:1fr}.cnt{padding:12px 14px}.sum-ring-row{gap:12px}}
</style>
</head>
<body>
<div class="hdr"><div><div class="logo">HIGHDENT<small>Bestandsaufnahme & Praxisanalyse</small></div></div><div class="hbtns" id="hb"></div></div>
<div id="app"></div>
<div class="notif" id="nf"></div>
<div class="mo" id="cmo"><div class="mbox"><h2>Bestätigung</h2><p id="cmsg" style="font-size:13px;color:var(--tm);margin-bottom:14px;line-height:1.5"></p><div style="display:flex;justify-content:flex-end;gap:6px"><button class="btn btn-o" onclick="cr(false)">Abbrechen</button><button class="btn btn-g" onclick="cr(true)">OK</button></div></div></div>
<div class="pv" id="pvw"><div class="x" onclick="cpv()">✕</div><img id="pvi" src=""><button class="btn btn-r del" onclick="dpv()">🗑️ Löschen</button></div>
<input type="file" id="cam" accept="image/*" capture="environment" style="display:none">

<script>
var SK='highdent_bestandsaufnahme';
var defaultDropdowns={
  spezialisierungen:['Implantologie','Parodontologie','Endodontie','Kieferorthopädie','Aligner','Ästhetische Zahnmedizin','Kinderzahnheilkunde','Oralchirurgie','CMD/Funktionsdiagnostik','Biologische Zahnmedizin','Sportschutz','Bleaching','Veneers','Prothetik','Laserbehandlung','Schlafmedizin'],
  pvs_systeme:['Dampsoft','Charly by Solutio','Z1 (CGM)','Evident','Aesculap','Linudent','Freestyle','Chremasoft','CompuGroup (Z1.PRO)','Andere'],
  behandlungsspektrum_extras:['Lachgassedierung','Vollnarkose','3D-Diagnostik','Guided Surgery','All-on-4','Sinuslift','Knochenaugmentation','Wurzelspitzenresektion','Hemisektion']
};
var SECTIONS=[
  {id:'praxis',title:'1. Allgemeine Praxisdaten',items:[
    {k:'Praxisname',t:'text'},{k:'Ansprechpartner',t:'text'},{k:'Inhaber/Behandler',t:'text'},
    {k:'Anzahl Behandler',t:'num'},{k:'Anzahl Standorte',t:'num'},
    {k:'Praxisphilosophie',t:'text'},
    {k:'Spezialisierungen',t:'dropdown',dd:'spezialisierungen'},
    {k:'Patienten pro Quartal',t:'num'}
  ]},
  {id:'personal',title:'2. Personalstruktur',items:[
    {k:'Anzahl ZFA',t:'num'},{k:'Anzahl ZMP',t:'num'},{k:'Anzahl DH',t:'num'},{k:'Anzahl Verwaltung',t:'num'},
    {k:'Verantwortlichkeiten klar definiert',t:'check'},{k:'Vertretungsregelung vorhanden',t:'check'}
  ]},
  {id:'software',title:'3. Software & Digitalisierung',items:[
    {k:'PVS-System',t:'dropdown',dd:'pvs_systeme'},{k:'Tageskontrolle',t:'check'},{k:'Offene Leistungen Kontrolle',t:'check'},
    {k:'Digitale Aufklärung',t:'check'},{k:'Recall-System',t:'check'},{k:'DS-Core',t:'check'},{k:'KIM/EBZ',t:'check'}
  ]},
  {id:'behandlung',title:'4. Behandlungsspektrum',items:[
    {k:'Implantologie',t:'check'},{k:'Parodontologie',t:'check'},{k:'Endodontie',t:'check'},{k:'Aligner',t:'check'},
    {k:'Prophylaxe',t:'check'},{k:'Chirurgie',t:'check'},{k:'Lasertherapie',t:'check'},
    {k:'Biologische Zahnheilkunde',t:'check'},{k:'PRF',t:'check'},{k:'Ozontherapie',t:'check'},
    {k:'Dentcoat',t:'check'},{k:'DVT-gestützte Diagnostik',t:'check'}
  ]},
  {id:'digital',title:'5. Digitale Ausstattung',items:[
    {k:'DVT',t:'check'},{k:'OPG',t:'check'},{k:'Intraoralscanner',t:'text'},{k:'CEREC/Primescan',t:'check'},
    {k:'Trios',t:'check'},{k:'Medit',t:'check'},{k:'Intraoralkamera',t:'check'},{k:'CAD/CAM',t:'check'}
  ]},
  {id:'labor',title:'6. Labor',items:[
    {k:'Eigenlabor',t:'check'},{k:'Fremdlabor',t:'text'},{k:'BEL/BEB-Strukturen',t:'check'},
    {k:'Materialkosten dokumentiert',t:'check'},{k:'Implantatkomponenten dokumentiert',t:'check'},
    {k:'CAD/CAM-Kosten berücksichtigt',t:'check'}
  ]},
  {id:'doku',title:'7. Dokumentation & Abrechnung',items:[
    {k:'Dokumentationsstandards',t:'check'},{k:'Röntgendokumentation',t:'check'},{k:'OP-Berichte',t:'check'},
    {k:'GOZ-Faktorsteigerungen',t:'check'},{k:'Analogleistungen',t:'check'},{k:'Privatvereinbarungen',t:'check'},
    {k:'Verlangensleistungen',t:'check'},{k:'UPT-Konzept',t:'check'}
  ]},
  {id:'honorar',title:'8. Honoraroptimierung',items:[
    {k:'Nicht abgerechnete Leistungen',t:'check'},{k:'Dokumentationslücken',t:'check'},
    {k:'Fehlende Analogleistungen',t:'check'},{k:'Fehlende Faktorsteigerungen',t:'check'},
    {k:'Chairside-Leistungen',t:'check'},{k:'Laborpotenziale',t:'check'},{k:'KPI-Auswertung',t:'check'}
  ]},
  {id:'analyse',title:'9. Highdent Analyse',items:[
    {k:'Quick Wins',t:'text'},{k:'Mittelfristige Maßnahmen',t:'text'},{k:'Langfristige Maßnahmen',t:'text'},
    {k:'Geschätztes Honorarpotenzial',t:'text'},{k:'Empfohlene Dienstleistungen',t:'text'}
  ]}
];
var STS=[{k:'ok',l:'✓ Ja',c:'c-ok',f:'Vorhanden'},{k:'teilweise',l:'◐ Teilw.',c:'c-tl',f:'Teilweise'},{k:'fehlt',l:'✗ Nein',c:'c-fl',f:'Fehlt'},{k:'na',l:'– N/A',c:'c-na',f:'N/A'}];

var st={v:'home',ci:null,as:[],dropdowns:JSON.parse(JSON.stringify(defaultDropdowns)),supaUrl:'',supaKey:'',cloudKunden:[]};
var cR=null,phCtx=null,vpCtx=null;

function ld(){try{var d=JSON.parse(localStorage.getItem(SK));if(d){if(d.as)st.as=d.as;if(d.dropdowns)st.dropdowns=d.dropdowns;if(d.supaUrl)st.supaUrl=d.supaUrl;if(d.supaKey)st.supaKey=d.supaKey;if(d.cloudKunden)st.cloudKunden=d.cloudKunden;}}catch(e){}}
function sv(){try{localStorage.setItem(SK,JSON.stringify({as:st.as,dropdowns:st.dropdowns,supaUrl:st.supaUrl,supaKey:st.supaKey,cloudKunden:st.cloudKunden}));}catch(e){}}
function nf(m){var n=document.getElementById('nf');n.textContent=m;n.classList.add('show');setTimeout(function(){n.classList.remove('show');},2200);}
function c2(m){return new Promise(function(r){document.getElementById('cmsg').textContent=m;document.getElementById('cmo').classList.add('open');cR=r;});}
function cr(v){document.getElementById('cmo').classList.remove('open');if(cR)cR(v);cR=null;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function td(){return new Date().toISOString().slice(0,10);}
function fd(d){if(!d)return'–';var p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function A(){return st.ci!==null?st.as[st.ci]:null;}
function D(a,sid,k){if(!a.data[sid])a.data[sid]={};if(!a.data[sid][k])a.data[sid][k]={};return a.data[sid][k];}
function cp(a){var t=0,f=0;SECTIONS.forEach(function(s){s.items.forEach(function(it){t++;var d=(a.data[s.id]||{})[it.k];if(d&&(d.status||d.val||(d.tags&&d.tags.length)))f++;});});return t?Math.round(f/t*100):0;}
function cs(a){var c=0;SECTIONS.forEach(function(s){s.items.forEach(function(it){var d=(a.data[s.id]||{})[it.k];if(d&&d.star)c++;});});return c;}
function spx(a,s){var t=s.items.length,f=0;s.items.forEach(function(it){var d=(a.data[s.id]||{})[it.k];if(d&&(d.status||d.val||(d.tags&&d.tags.length)))f++;});return t?Math.round(f/t*100):0;}
// ═══ SUPABASE SYNC ═══
async function syncKunden(){
  if(!st.supaUrl||!st.supaKey){nf('⚠️ URL und Key eintragen');return;}
  nf('🔄 Synchronisiere…');
  try{
    var url=st.supaUrl.replace(/\/$/,'');
    var r=await fetch(url+'/rest/v1/app_data?select=data&order=updated_at.desc&limit=1',{
      headers:{'apikey':st.supaKey,'Authorization':'Bearer '+st.supaKey,'Content-Type':'application/json'}
    });
    if(!r.ok){nf('❌ Fehler '+r.status);return;}
    var rows=await r.json();
    if(!rows.length||!rows[0].data){nf('❌ Keine Daten in Cloud');return;}
    var d=rows[0].data;
    if(d.kunden){st.cloudKunden=d.kunden;sv();render();nf('✅ '+st.cloudKunden.length+' Kunden geladen');}

  h+='<div class="sum-ring"><svg class="ring-svg" viewBox="0 0 84 84"><circle class="ring-bg" cx="42" cy="42" r="38"/><circle class="ring-fill" cx="42" cy="42" r="38" stroke="'+ringColor(pct)+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'" data-target="'+(circ*(1-pct/100))+'"/></svg><div class="ring-val">'+pct+'%</div><div class="ring-label">Gesamt</div></div>';
  // Per-metric rings
  var answered=ok+tl+fl+na;var okPct=answered?Math.round(ok/answered*100):0;var flPct=answered?Math.round(fl/answered*100):0;
  h+='<div class="sum-ring"><svg class="ring-svg" viewBox="0 0 84 84"><circle class="ring-bg" cx="42" cy="42" r="38"/><circle class="ring-fill" cx="42" cy="42" r="38" stroke="#7ab06a" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'" data-target="'+(circ*(1-okPct/100))+'"/></svg><div class="ring-val" style="color:#7ab06a">'+okPct+'%</div><div class="ring-label">Vorhanden</div></div>';
  h+='<div class="sum-ring"><svg class="ring-svg" viewBox="0 0 84 84"><circle class="ring-bg" cx="42" cy="42" r="38"/><circle class="ring-fill" cx="42" cy="42" r="38" stroke="#d47a7a" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'" data-target="'+(circ*(1-flPct/100))+'"/></svg><div class="ring-val" style="color:#d47a7a">'+flPct+'%</div><div class="ring-label">Fehlt</div></div>';
  h+='</div></div>';
  // Findings cards
  h+='<div class="find-grid"><div class="find-card fc-g"><div class="find-num" style="color:var(--grn)">'+ok+'</div><div class="find-lbl">Vorhanden</div></div><div class="find-card fc-y"><div class="find-num" style="color:var(--gd)">'+tl+'</div><div class="find-lbl">Teilweise</div></div><div class="find-card fc-r"><div class="find-num" style="color:var(--red)">'+fl+'</div><div class="find-lbl">Fehlt</div></div></div>';
  // Stars priority
  var starred=[];SECTIONS.forEach(function(s){s.items.forEach(function(it){var d=(a.data[s.id]||{})[it.k];if(d&&d.star)starred.push({sec:s.title,item:it.k,d:d,t:it.t});});});
  if(starred.length){
    h+='<div class="prio-card"><div class="prio-title">⭐ Priorisierte Potenziale <span style="font-size:12px;font-weight:400;color:var(--ts)">('+starred.length+')</span></div>';
    starred.forEach(function(s){
      var dc=s.d.status==='ok'?'g':s.d.status==='teilweise'?'y':s.d.status==='fehlt'?'r':'x';
      h+='<div class="prio-item"><div class="prio-dot '+dc+'"></div><div class="prio-txt"><strong>'+s.item+'</strong>'+(s.d.val?' — '+esc(s.d.val):'')+(s.d.tags&&s.d.tags.length?' — '+s.d.tags.join(', '):'')+(s.d.note?'<br><span style="color:var(--ts)">'+esc(s.d.note)+'</span>':'')+'</div></div>';
    });h+='</div>';}
  // Section score bars
  h+='<div style="margin-bottom:14px">';
  SECTIONS.forEach(function(sec){
    var spr=spx(a,sec);var sOk=0,sTl=0,sFl=0,notes=[];
    sec.items.forEach(function(it){var d=(a.data[sec.id]||{})[it.k];if(!d)return;if(d.status==='ok')sOk++;else if(d.status==='teilweise')sTl++;else if(d.status==='fehlt')sFl++;if(d.note||d.val||(d.tags&&d.tags.length)||d.star)notes.push({item:it.k,d:d,t:it.t});});
    var barColor=spr>=80?'var(--grn)':spr>=40?'var(--gl)':'var(--red)';
    h+='<div class="sec-score"><div class="sec-score-top"><div class="sec-score-name">'+sec.title+'</div><div class="sec-score-pct" style="color:'+barColor+'">'+spr+'%</div></div><div class="sec-bar"><div class="sec-bar-fill" style="width:0%;background:'+barColor+'" data-width="'+spr+'%"></div></div>';
    h+='<div class="sec-score-detail"><span style="color:var(--grn)">✓'+sOk+'</span><span style="color:var(--gd)">◐'+sTl+'</span><span style="color:var(--red)">✗'+sFl+'</span></div>';
    if(notes.length){h+='<div style="margin-top:8px;border-top:1px solid var(--br);padding-top:6px">';notes.forEach(function(n){
      var c=n.d.status==='ok'?'var(--grn)':n.d.status==='fehlt'?'var(--red)':'var(--gd)';
      var detail=n.d.val?esc(n.d.val):'';if(n.d.tags&&n.d.tags.length)detail+=(detail?', ':'')+n.d.tags.join(', ');if(n.d.note)detail+=(detail?' — ':'')+esc(n.d.note);
      h+='<div style="font-size:11px;margin-bottom:3px">'+(n.d.star?'⭐ ':'')+'<strong style="color:'+c+'">'+n.item+'</strong>'+(detail?' — '+detail:'')+(n.d.photos&&n.d.photos.length?' 📷'+n.d.photos.length:'')+'</div>';
    });h+='</div>';}
    h+='</div>';
  });h+='</div>';
  h+='<div style="display:flex;gap:6px;margin-top:14px;padding-bottom:24px"><button class="btn btn-g" onclick="xPDF()">📥 PDF</button><button class="btn btn-o" onclick="emailA()">📧 E-Mail</button><button class="btn btn-r btn-s" onclick="delA()">🗑️</button></div>';
  return h;
}
function ringColor(p){return p>=70?'#7ab06a':p>=40?'#c4a855':'#d47a7a';}
function animateRings(){
  document.querySelectorAll('.ring-fill').forEach(function(el){var t=parseFloat(el.getAttribute('data-target'));el.style.strokeDashoffset=t;});
  document.querySelectorAll('.sec-bar-fill').forEach(function(el){el.style.width=el.getAttribute('data-width');});
}

// ══ EMAIL ══
function emailA(){var a=A();if(!a)return;xPDF();var anr=a.anrede==='Herr'?'Sehr geehrter Herr':'Sehr geehrte Frau';var nm=(a.titel?a.titel+' ':'')+a.nachname;var subj='Highdent – Bestandsaufnahme '+esc(a.pn||'');var body=anr+' '+nm+',\n\nvielen Dank für das entgegengebrachte Vertrauen und die Möglichkeit, Ihre Praxis analysieren zu dürfen.\n\nAnbei erhalten Sie die Ergebnisse unserer Praxisanalyse als PDF.\n\nFür Rückfragen stehen wir jederzeit gerne zur Verfügung.\n\nHerzliche Grüße\n'+(a.ber||'')+'\nHighdent Service';setTimeout(function(){window.location.href='mailto:'+(a.email||'')+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);},500);nf('📧 PDF heruntergeladen — bitte anhängen');}

// ══ PDF ══
function xPDF(){var a=A();if(!a){nf('⚠️ Keine Analyse');return;}try{var j=window.jspdf.jsPDF;var pdf=new j('p','mm','a4');var W=210,ml=18,mr=18,cw=W-ml-mr;var cG=[139,115,64],cT=[44,36,24],cW=[153,141,120],cGrn=[90,138,74],cR=[179,64,64],cY=[196,168,85];var y=16;pdf.setFont('helvetica','bold');pdf.setFontSize(16);pdf.setTextColor(cG[0],cG[1],cG[2]);pdf.text('HIGHDENT',ml,y);pdf.setFont('helvetica','normal');pdf.setFontSize(9);pdf.setTextColor(cW[0],cW[1],cW[2]);pdf.text('Bestandsaufnahme & Praxisanalyse',ml+36,y);y+=3;pdf.setDrawColor(cG[0],cG[1],cG[2]);pdf.setLineWidth(0.4);pdf.line(ml,y,W-mr,y);y+=7;pdf.setFont('helvetica','bold');pdf.setFontSize(12);pdf.setTextColor(cT[0],cT[1],cT[2]);pdf.text(a.pn||'–',ml,y);pdf.setFont('helvetica','normal');pdf.setFontSize(8);pdf.setTextColor(cW[0],cW[1],cW[2]);pdf.text((a.anrede||'')+' '+(a.titel?a.titel+' ':'')+(a.vorname?a.vorname+' ':'')+a.nachname,ml,y+4);pdf.text((a.ort||'')+' · '+(a.ber||'')+' · '+fd(a.dt),ml,y+8);y+=15;SECTIONS.forEach(function(sec){if(y>255){pdf.addPage();y=16;}pdf.setFont('helvetica','bold');pdf.setFontSize(9);pdf.setTextColor(cG[0],cG[1],cG[2]);pdf.text(sec.title,ml,y);y+=5;sec.items.forEach(function(it){if(y>270){pdf.addPage();y=16;}var d=(a.data[sec.id]||{})[it.k]||{};if(d.status==='ok')pdf.setFillColor(cGrn[0],cGrn[1],cGrn[2]);else if(d.status==='teilweise')pdf.setFillColor(cY[0],cY[1],cY[2]);else if(d.status==='fehlt')pdf.setFillColor(cR[0],cR[1],cR[2]);else pdf.setFillColor(200,200,200);pdf.circle(ml+2,y-1,1.2,'F');pdf.setFont('helvetica','normal');pdf.setFontSize(8);pdf.setTextColor(cT[0],cT[1],cT[2]);var label=(d.star?'★ ':'')+it.k;if(d.val)label+=' — '+d.val;if(d.tags&&d.tags.length)label+=' — '+d.tags.join(', ');pdf.text(pdf.splitTextToSize(label,70),ml+6,y);if(d.note){pdf.setFontSize(7);pdf.setTextColor(cW[0],cW[1],cW[2]);var nl=pdf.splitTextToSize(d.note,72);pdf.text(nl,ml+82,y);y+=Math.max(4,nl.length*3);}else y+=4;});y+=3;});pdf.save('Bestandsaufnahme_'+(a.pn||'Praxis').replace(/\s+/g,'_')+'.pdf');nf('📥 PDF heruntergeladen');}catch(e){nf('⚠️ '+e.message);}}

// ══ COMPARE ══
function oCmp(){if(st.as.length<2)return;var h='<div class="cnt" style="max-width:860px;padding-top:16px"><div class="stit">📊 Vergleich</div><div style="display:flex;gap:8px;margin:10px 0"><select id="c1" class="fi" style="flex:1">';st.as.forEach(function(a,i){h+='<option value="'+i+'">'+esc(a.pn||'Analyse '+(i+1))+'</option>';});h+='</select><select id="c2" class="fi" style="flex:1">';st.as.forEach(function(a,i){h+='<option value="'+i+'"'+(i===1?' selected':'')+'>'+esc(a.pn||'Analyse '+(i+1))+'</option>';});h+='</select><button class="btn btn-g btn-s" onclick="rCmp()">Los</button></div><div id="cmpR"></div><button class="btn btn-o" style="margin-top:12px" onclick="goH()">← Zurück</button></div>';document.getElementById('app').innerHTML=h;document.getElementById('hb').innerHTML='<button class="btn btn-o btn-s" onclick="goH()">🏠</button>';}
function rCmp(){var a1=st.as[document.getElementById('c1').value],a2=st.as[document.getElementById('c2').value];var h='<div style="background:var(--card);border:1px solid var(--br);border-radius:8px;overflow:hidden">';h+='<div class="cr ch2"><div class="cc">Prüfpunkt</div><div class="cc">'+esc(a1.pn||'A1')+'</div><div class="cc">'+esc(a2.pn||'A2')+'</div></div>';SECTIONS.forEach(function(sec){h+='<div class="cr" style="background:var(--bg2)"><div class="cc" style="grid-column:1/-1;font-weight:600;color:var(--gd);font-size:10px">'+sec.title+'</div></div>';sec.items.forEach(function(it){var d1=(a1.data[sec.id]||{})[it.k]||{},d2=(a2.data[sec.id]||{})[it.k]||{};var v1=d1.val||d1.status||(d1.tags?d1.tags.join(', '):'')|| '–';var v2=d2.val||d2.status||(d2.tags?d2.tags.join(', '):'')||'–';var c1=d1.status==='ok'?'var(--grn)':d1.status==='fehlt'?'var(--red)':'var(--tm)';var c2=d2.status==='ok'?'var(--grn)':d2.status==='fehlt'?'var(--red)':'var(--tm)';h+='<div class="cr"><div class="cc" style="font-weight:500">'+it.k+'</div><div class="cc" style="color:'+c1+'">'+v1+'</div><div class="cc" style="color:'+c2+'">'+v2+'</div></div>';});});h+='</div>';document.getElementById('cmpR').innerHTML=h;}
async function delA(){if(!await c2('Analyse löschen?'))return;st.as.splice(st.ci,1);sv();goH();nf('🗑️ Gelöscht');}
