<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Highdent – Bestandsaufnahme</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f3ec;--bg2:#ede8de;--bg3:#e4ddd0;--card:#fffdf9;--gd:#8b7340;--gd2:#a08650;--gl:#c4a855;--td:#2c2418;--tm:#5a4e3a;--ts:#998d78;--br:rgba(139,115,64,.12);--br2:rgba(139,115,64,.2);--grn:#5a8a4a;--red:#b34040;--blu:#4a6e8a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--td);min-height:100dvh}
::selection{background:rgba(196,168,85,.25)}
.hdr{background:var(--card);border-bottom:1px solid var(--br);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gd);letter-spacing:2px}
.logo small{font-family:'Jost',sans-serif;font-size:10px;color:var(--ts);letter-spacing:.5px;display:block;font-weight:400}
.hbtns{display:flex;gap:5px}
.btn{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;transition:all .12s;touch-action:manipulation}
.btn-g{background:var(--gd);color:#fff}.btn-g:active{background:var(--gd2)}
.btn-o{background:transparent;border:1px solid var(--br2);color:var(--tm)}.btn-o:active{background:var(--bg2)}
.btn-s{padding:5px 10px;font-size:12px}.btn-r{background:var(--red);color:#fff}
.pstrip{background:var(--card);border-bottom:1px solid var(--br);padding:8px 20px;display:flex;align-items:center;gap:10px}
.pbar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--gl),var(--grn));border-radius:3px;transition:width .4s}
.ptxt{font-size:11px;color:var(--ts);font-weight:500}
.tabs{display:flex;gap:4px;padding:10px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg)}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--tm);border:1px solid var(--br);touch-action:manipulation;flex-shrink:0}
.tab.act{background:var(--gd);color:#fff;border-color:var(--gd)}
.tab.done{color:var(--grn);border-color:rgba(90,138,74,.2)}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.dot.dg{background:var(--grn)}.dot.dy{background:var(--gl)}.dot.de{background:var(--bg3)}
.cnt{padding:16px 20px;max-width:860px;margin:0 auto}
.stit{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--gd);margin-bottom:12px}
.card{background:var(--card);border:1px solid var(--br);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.card:has(.dd-opts.open){overflow:visible}
.sec:has(.dd-opts.open),.cnt:has(.dd-opts.open){overflow:visible}
.card.starred{border-left:3px solid var(--gl)}.card.st-ok{border-left:3px solid var(--grn)}.card.st-teilweise{border-left:3px solid var(--gl)}.card.st-fehlt{border-left:3px solid var(--red)}
.card-top{padding:12px 14px;display:flex;align-items:flex-start;gap:8px}
.card-star{font-size:16px;cursor:pointer;touch-action:manipulation;opacity:.25;transition:all .1s;flex-shrink:0;padding:2px}
.card-star.on{opacity:1}
.card-main{flex:1;min-width:0}
.card-label{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:6px}
.card-input{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fi{border:1px solid var(--br2);border-radius:6px;padding:7px 10px;font-family:'Jost',sans-serif;font-size:13px;background:var(--bg);color:var(--td);outline:none}
.fi:focus{border-color:var(--gd);background:var(--card)}
.fi-num{width:70px;text-align:center}.fi-txt{flex:1;min-width:120px}
.fi-note{width:100%;margin-top:6px;min-height:36px;resize:none;line-height:1.4}
.chips{display:flex;gap:3px;flex-shrink:0}
.ch{padding:5px 9px;border-radius:12px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--br);background:var(--card);color:var(--ts);transition:all .1s;touch-action:manipulation}
.ch:active{transform:scale(.94)}
.ch.c-ok{background:rgba(90,138,74,.1);color:var(--grn);border-color:rgba(90,138,74,.25)}
.ch.c-tl{background:rgba(196,168,85,.1);color:var(--gd);border-color:rgba(196,168,85,.25)}
.ch.c-fl{background:rgba(179,64,64,.08);color:var(--red);border-color:rgba(179,64,64,.2)}
.ch.c-na{background:var(--bg2);color:var(--ts);border-color:var(--br2)}
.photos{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.phthumb{width:56px;height:56px;border-radius:5px;object-fit:cover;border:1px solid var(--br);cursor:pointer}
.phadd{width:40px;height:40px;border-radius:5px;border:1.5px dashed var(--br2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ts);cursor:pointer;background:var(--bg);touch-action:manipulation;flex-shrink:0}
.phadd:active{background:var(--bg2)}
/* Dropdown tags */
.tag-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500;background:rgba(139,115,64,.08);color:var(--gd);border:1px solid var(--br2)}
.tag .tx{cursor:pointer;font-size:14px;color:var(--ts)}
.tag .tx:active{color:var(--red)}
.dd-wrap{position:relative}
.dd-opts{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--br2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:320px;overflow-y:auto;z-index:60;display:none;margin-top:2px}
.dd-opts.open{display:block}
.dd-opt{padding:7px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--br)}
.dd-opt:hover,.dd-opt:active{background:var(--bg2)}
.dd-opt:last-child{border-bottom:none}
.dd-opt.sel{color:var(--grn);font-weight:500}
/* Info grid */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}.ig.t3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:9px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:1.5px}
.nav{display:flex;justify-content:space-between;margin-top:16px;padding-bottom:24px}
/* ═══ WOW SUMMARY ═══ */
.sum-hero{background:linear-gradient(135deg,#2c2418 0%,#5a4e3a 50%,#8b7340 100%);border-radius:16px;padding:28px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.sum-hero::before{content:'';position:absolute;top:-40%;right:-20%;width:300px;height:300px;border-radius:50%;background:rgba(196,168,85,.12)}
.sum-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:200px;height:200px;border-radius:50%;background:rgba(196,168,85,.08)}
.sum-hero *{position:relative;z-index:1}
.sum-hero-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;margin-bottom:2px}
.sum-hero-sub{font-size:12px;opacity:.7;margin-bottom:18px}
.sum-ring-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.sum-ring{text-align:center}
.ring-svg{width:90px;height:90px}
.ring-bg{fill:none;stroke:rgba(255,255,255,.12);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease;transform-origin:center;transform:rotate(-90deg)}
.ring-label{font-size:10px;opacity:.6;margin-top:4px}
.ring-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700}
/* Section score bars */
.sec-score{background:var(--card);border:1px solid var(--br);border-radius:10px;padding:14px 16px;margin-bottom:8px}
.sec-score-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sec-score-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--gd)}
.sec-score-pct{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700}
.sec-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.sec-bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.sec-score-detail{display:flex;gap:10px;font-size:11px;margin-top:6px;color:var(--ts)}
/* Priority card */
.prio-card{background:linear-gradient(135deg,rgba(196,168,85,.06),rgba(196,168,85,.14));border:1px solid rgba(196,168,85,.25);border-radius:12px;padding:18px;margin-bottom:14px}
.prio-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gd);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.prio-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:var(--card);border-radius:8px;border:1px solid var(--br);margin-bottom:6px}
.prio-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.prio-dot.g{background:var(--grn)}.prio-dot.y{background:var(--gl)}.prio-dot.r{background:var(--red)}.prio-dot.x{background:var(--bg3)}
.prio-txt{flex:1;font-size:13px;line-height:1.5}
.prio-txt strong{color:var(--gd)}
/* Findings */
.find-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.find-card{background:var(--card);border-radius:10px;border:1px solid var(--br);padding:14px;text-align:center;position:relative;overflow:hidden}
.find-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.find-card.fc-g::before{background:var(--grn)}.find-card.fc-y::before{background:var(--gl)}.find-card.fc-r::before{background:var(--red)}.find-card.fc-x::before{background:var(--bg3)}
.find-num{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700}
.find-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ts);margin-top:2px}
/* Home */
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;padding:36px 20px}
.home-t{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--gd);margin-bottom:4px}
.home-d{font-size:13px;color:var(--ts);max-width:360px;line-height:1.6;margin-bottom:20px}
.slist{width:100%;max-width:480px;margin-top:16px}
.si{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--card);border:1px solid var(--br);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:all .12s}
.si:active{background:var(--bg2);border-color:var(--gd)}
/* Modal / Photo viewer */
.mo{display:none;position:fixed;inset:0;background:rgba(44,36,24,.45);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:14px}
.mo.open{display:flex}
.mbox{background:var(--card);border-radius:12px;padding:20px;width:500px;max-width:100%;max-height:85vh;overflow-y:auto;border:1px solid var(--br)}
.mbox h2{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--gd);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--br)}
.pv{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:150;display:none;align-items:center;justify-content:center;padding:16px}
.pv.open{display:flex}
.pv img{max-width:92%;max-height:82vh;border-radius:6px}
.pv .x{position:absolute;top:14px;right:18px;color:#fff;font-size:26px;cursor:pointer}
.pv .del{position:absolute;bottom:18px;right:18px}
/* Settings */
.set-item{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.set-item input{flex:1}
.notif{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gd);color:#fff;padding:9px 16px;border-radius:7px;font-size:13px;z-index:200;opacity:0;transition:all .3s;max-width:320px;text-align:center}
.notif.show{transform:translateX(-50%) translateY(0);opacity:1}
/* Compare */
.cr{display:grid;grid-template-columns:2fr 1fr 1fr;border-bottom:1px solid var(--br);font-size:11px}
.cr.ch2{background:var(--bg2);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--gd)}
.cc{padding:6px 8px;border-right:1px solid var(--br)}.cc:last-child{border-right:none}
@media(max-width:640px){.find-grid{grid-template-columns:1fr 1fr}.ig,.ig.t3{grid-template-columns:1fr}.cnt{padding:12px 14px}.sum-ring-row{gap:12px}}
</style>
<script>
// ═══ SUPABASE SYNC FÜR BESTANDSAUFNAHME ═══
var SupabaseBA = (function(){
  var URL='', KEY='', cfg=false;
  function openIDB(){return new Promise(function(res,rej){
    var r=indexedDB.open('highdent_ba_sync',1);
    r.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains('meta'))db.createObjectStore('meta',{keyPath:'key'});};
    r.onsuccess=function(e){res(e.target.result);};r.onerror=function(){rej(r.error);};
  });}
  async function getMeta(k){var db=await openIDB();return new Promise(function(res){
    var tx=db.transaction('meta','readonly');var r=tx.objectStore('meta').get(k);
    r.onsuccess=function(){res(r.result?r.result.value:null);};r.onerror=function(){res(null);};});}
  async function setMeta(k,v){var db=await openIDB();return new Promise(function(res){
    var tx=db.transaction('meta','readwrite');tx.objectStore('meta').put({key:k,value:v});tx.oncomplete=function(){res();};});}
  async function init(){try{var u=await getMeta('supabase_url');var k=await getMeta('supabase_key');if(u&&k){URL=u;KEY=k;cfg=true;}}catch(e){}}
  async function configure(u,k){URL=u;KEY=k;cfg=!!(u&&k);await setMeta('supabase_url',u);await setMeta('supabase_key',k);return cfg;}
  function isConfigured(){return cfg;}
  function isOnline(){return navigator.onLine;}
  function uid(){return 'highdent_shared';}
  async function testConnection(){if(!cfg)return false;try{
    var r=await fetch(URL+'/rest/v1/ba_analyses?select=id&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    return r.status!==401&&r.status!==403;}catch(e){return false;}}
  async function sb(path,method,body){
    var r=await fetch(URL+path,{method:method,headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,
      'Prefer':method==='POST'?'resolution=merge-duplicates,return=representation':'return=representation'},body:body?JSON.stringify(body):undefined});
    if(!r.ok){throw new Error(await r.text());}return r.json();}

  // ── ANALYSEN ──
  async function uploadAnalyses(state,silent){
    if(!cfg||!isOnline())return;
    var lastUp=(await getMeta('lastUploadTime'))||0;
    var changed=state.as.filter(function(a){return !a._updated||a._updated>lastUp;});
    if(changed.length>0){try{
      var rows=changed.map(function(a){return {id:String(a.id),_owner:uid(),_updated:a._updated||0,
        kid:a.kid?String(a.kid):null,pn:a.pn||'',ber:a.ber||'',ort:a.ort||'',dt:a.dt||'',
        anrede:a.anrede||'',titel:a.titel||'',vorname:a.vorname||'',nachname:a.nachname||'',
        email:a.email||'',data_json:JSON.stringify(a.data||{}),sec:a.sec||0};});
      await sb('/rest/v1/ba_analyses','POST',rows);
    }catch(e){console.warn('[BA] Upload Analysen:',e.message);}}
    try{await sb('/rest/v1/ba_settings','POST',[{id:uid(),data:JSON.stringify({dropdowns:state.dropdowns,_tombstones:state._tombstones||{}})}]);}catch(e){}
    var maxStamp=lastUp;state.as.forEach(function(a){if(a._updated&&a._updated>maxStamp)maxStamp=a._updated;});
    await setMeta('lastUploadTime',maxStamp);
  }
  async function downloadAnalyses(){
    if(!cfg||!isOnline())return null;
    var data={as:[],dropdowns:null,_tombstones:{}};
    try{var rows=await sb('/rest/v1/ba_analyses?_owner=eq.'+uid()+'&select=*','GET');
      data.as=rows.map(function(r){var a={id:r.id,kid:r.kid,pn:r.pn,ber:r.ber,ort:r.ort,dt:r.dt,
        anrede:r.anrede,titel:r.titel,vorname:r.vorname,nachname:r.nachname,email:r.email,
        sec:r.sec||0,_updated:r._updated||0,data:{}};
        try{a.data=JSON.parse(r.data_json||'{}');}catch(e){}
        if(a.id&&!isNaN(a.id))a.id=parseInt(a.id);
        if(a.kid&&!isNaN(a.kid))a.kid=parseInt(a.kid);
        return a;});
    }catch(e){console.warn('[BA] Download Analysen:',e.message);}
    try{var s=await sb('/rest/v1/ba_settings?id=eq.'+uid()+'&select=*','GET');
      if(s&&s[0]){var p=JSON.parse(s[0].data);if(p.dropdowns)data.dropdowns=p.dropdowns;if(p._tombstones)data._tombstones=p._tombstones;}
    }catch(e){}
    return data;
  }
  async function deleteAnalysis(id){if(!cfg||!isOnline())return;try{
    await fetch(URL+'/rest/v1/ba_analyses?id=eq.'+id+'&_owner=eq.'+uid(),{method:'DELETE',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});}catch(e){}}

  // ── GEMEINSAME KUNDEN-TABELLE (mit Management-App geteilt) ──
  async function downloadKunden(){
    if(!cfg||!isOnline())return [];
    try{var rows=await sb('/rest/v1/kunden?_owner=eq.'+uid()+'&select=*','GET');
      return rows.map(function(k){if(k.id&&!isNaN(k.id))k.id=parseInt(k.id);return k;});
    }catch(e){console.warn('[BA] Download Kunden:',e.message);return [];}
  }
  async function uploadKunde(kunde){
    if(!cfg||!isOnline())return false;
    try{
      var row=Object.assign({},kunde,{_owner:uid(),_updated:Date.now()});
      await sb('/rest/v1/kunden','POST',[row]);
      return true;
    }catch(e){console.warn('[BA] Upload Kunde:',e.message);return false;}
  }

  // ── FOTO-UPLOAD zu Supabase Storage ──
  var BUCKET='ba-fotos';
  async function uploadPhoto(blob,filename){
    if(!cfg||!isOnline())return null;
    try{
      var path=uid()+'/'+filename;
      var res=await fetch(URL+'/storage/v1/object/'+BUCKET+'/'+path,{
        method:'POST',
        headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'image/jpeg','x-upsert':'true'},
        body:blob
      });
      if(!res.ok){console.warn('[BA] Foto-Upload:',await res.text());return null;}
      return URL+'/storage/v1/object/public/'+BUCKET+'/'+path;
    }catch(e){console.warn('[BA] Foto-Upload Fehler:',e);return null;}
  }
  return {init:init,configure:configure,testConnection:testConnection,isConfigured:isConfigured,isOnline:isOnline,
    uploadAnalyses:uploadAnalyses,downloadAnalyses:downloadAnalyses,deleteAnalysis:deleteAnalysis,
    downloadKunden:downloadKunden,uploadKunde:uploadKunde,uploadPhoto:uploadPhoto,getMeta:getMeta,setMeta:setMeta,uid:uid};
})();
</script>

<script>
var SK='highdent_bestandsaufnahme';
var defaultDropdowns={
  spezialisierungen:['Implantologie','Parodontologie','Endodontie','Kieferorthopädie','Aligner','Ästhetische Zahnmedizin','Kinderzahnheilkunde','Oralchirurgie','CMD/Funktionsdiagnostik','Biologische Zahnmedizin','Sportschutz','Bleaching','Veneers','Prothetik','Laserbehandlung','Schlafmedizin'],
  pvs_systeme:['Dampsoft','Charly by Solutio','Z1 (CGM)','Evident','Aesculap','Linudent','Freestyle','Chremasoft','CompuGroup (Z1.PRO)','Andere'],
  behandlungsspektrum_extras:['Lachgassedierung','Vollnarkose','3D-Diagnostik','Guided Surgery','All-on-4','Sinuslift','Knochenaugmentation','Wurzelspitzenresektion','Hemisektion'],
  berater:['Charlotte Feldmann']
};
var SECTIONS=[

function loadImg(src){
  return new Promise(function(res,rej){
    if(!src){rej(new Error('no src'));return;}
    if(src.indexOf('data:')===0){res(src);return;}
    var img=new Image();img.crossOrigin='anonymous';
    img.onload=function(){try{var c=document.createElement('canvas');c.width=img.naturalWidth||800;c.height=img.naturalHeight||600;c.getContext('2d').drawImage(img,0,0);res(c.toDataURL('image/jpeg',0.85));}catch(e){rej(e);}};
    img.onerror=function(){rej(new Error('load fail'));};
    img.src=src;
  });
}

    });});

    if(_baSnap[String(a.id)]!==c||!a._updated){a._updated=now;_baSnap[String(a.id)]=c;}
  });
  Object.keys(_baSnap).forEach(function(k){
    if(!seen[k]){st._tombstones[k]=now;try{SupabaseBA.deleteAnalysis(k);}catch(e){}delete _baSnap[k];}
  });
}

// ═══ MERGE DOWNLOAD ═══
async function baMergeDownload(force){
  var data=await SupabaseBA.downloadAnalyses();
  if(!data)return false;
  var changed=false;
  var localById={};st.as.forEach(function(a){if(a.id!=null)localById[a.id]=a;});
  var result=[];var seen={};
  data.as.forEach(function(rem){
    if(rem.id==null)return;seen[rem.id]=true;
    var loc=localById[rem.id];
    if(!loc){result.push(rem);changed=true;}
    else if((rem._updated||0)>(loc._updated||0)){result.push(rem);changed=true;}
    else{result.push(loc);}
  });
  st.as.forEach(function(loc){if(loc.id!=null&&!seen[loc.id])result.push(loc);});
  if(data.dropdowns){
    var dd=data.dropdowns;
    Object.keys(dd).forEach(function(key){
      if((dd[key]||[]).length!==(st.dropdowns[key]||[]).length){st.dropdowns=dd;changed=true;}
    });
  }
  if(data._tombstones){
    if(!st._tombstones)st._tombstones={};
    Object.keys(data._tombstones).forEach(function(k){
      if(!st._tombstones[k]||data._tombstones[k]>st._tombstones[k])st._tombstones[k]=data._tombstones[k];
    });
    result=result.filter(function(a){var ts=st._tombstones[String(a.id)];if(!ts)return true;return (a._updated||0)>ts;});
  }
  if(changed||result.length!==st.as.length){st.as=result;changed=true;}
  if(changed||force){
    _baSnapInit=false;initBASnapshot();
    sv();render();
  }
  return changed;
}

function genSWvorschlag(){
  var a=A();if(!a)return;
  if((a.staerken&&a.staerken.length)||(a.schwaechen&&a.schwaechen.length)){if(!confirm('Vorhandene Punkte durch neuen Vorschlag ersetzen?'))return;}
  var st_=[],sw_=[];
  SECTIONS.forEach(function(sec){if(sec.id==='analyse')return;sec.items.forEach(function(it){

  });});

function genEmpfehlungen(){
  var a=A();if(!a){nf('⚠️ Keine Analyse');return;}
  if(!confirm('Empfehlungen automatisch aus den Checklisten erstellen? Vorhandene Texte in Sektion 9 werden ergänzt.'))return;
  var quick=[],mittel=[],lang=[],potenzial=0,dienste=[];
  Object.keys(EMPFEHLUNGS_REGELN).forEach(function(sid){
    var secData=a.data[sid]||{};
    Object.keys(EMPFEHLUNGS_REGELN[sid]).forEach(function(k){
      var d=secData[k]||{};
      // Empfehlung wenn Status "fehlt" oder "teilweise"
      if(d.status==='fehlt'||d.status==='teilweise'){
        var r=EMPFEHLUNGS_REGELN[sid][k];
        var txt='• '+r.e;
        if(r.kat==='quick')quick.push(txt);
        else if(r.kat==='mittel')mittel.push(txt);
        else lang.push(txt);
        if(r.pot)potenzial+=r.pot;
      }
    });
  });
  // Dienstleistungen ableiten
  var dokuData=a.data['doku']||{};
  if((dokuData['GOZ-Faktorsteigerungen']||{}).status==='fehlt'||(dokuData['Analogleistungen']||{}).status==='fehlt'){
    dienste.push('Highdent Abrechnungsservice GOZ','GOZ-Intensivschulung');
  }
  if((a.data['software']||{})['Recall-System']&&(a.data['software']||{})['Recall-System'].status==='fehlt'){
    dienste.push('Recall-Management Setup');
  }
  dienste.push('Praxis-Coaching');

  // In Sektion 9 schreiben
  if(!a.data['analyse'])a.data['analyse']={};
  function setField(key,arr){
    if(!arr.length)return;
    var cur=(a.data['analyse'][key]||{}).val||'';
    var neu=arr.join('\n');
    a.data['analyse'][key]={val:cur?cur+'\n'+neu:neu};
  }
  setField('Quick Wins',quick);
  setField('Mittelfristige Maßnahmen',mittel);
  setField('Langfristige Maßnahmen',lang);
  if(potenzial>0){
    var curP=(a.data['analyse']['Geschätztes Honorarpotenzial']||{}).val||'';
    a.data['analyse']['Geschätztes Honorarpotenzial']={val:curP||('ca. '+potenzial.toLocaleString('de-DE')+' € p.a.')};
  }
  if(dienste.length){
    var uniq=dienste.filter(function(v,i){return dienste.indexOf(v)===i;});
    var curD=(a.data['analyse']['Empfohlene Dienstleistungen']||{}).val||'';
    a.data['analyse']['Empfohlene Dienstleistungen']={val:curD||uniq.join(', ')};
  }
  try{stampBA();}catch(e){}
  sv();render();
  nf('✨ '+(quick.length+mittel.length+lang.length)+' Empfehlungen erstellt');
}


// ═══ FEATURE 2: DIGITALE UNTERSCHRIFT ═══
var _sigCtx=null,_sigDrawing=false,_sigCanvas=null,_sigC2d=null;
function openSig(which){
  _sigCtx=which; // 'inhaber' oder 'berater'
  var ov=document.createElement('div');
  ov.id='sigmodal';
  ov.style.cssText='position:fixed;inset:0;background:rgba(30,26,20,.6);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px';
  var _a=A();var label=which==='inhaber'?(personName(_a)||'Praxisinhaber'):((_a&&_a.ber)||'Berater');
  ov.innerHTML='<div style="background:var(--card);border-radius:12px;max-width:520px;width:100%;padding:20px"><div style="font-family:Cormorant Garamond,serif;font-size:20px;font-weight:600;color:var(--gd);margin-bottom:4px">Unterschrift '+label+'</div><div style="font-size:12px;color:var(--ts);margin-bottom:12px">Mit dem Finger oder Stift unterschreiben.</div><canvas id="sigcanvas" width="480" height="200" style="width:100%;border:2px dashed var(--br);border-radius:8px;background:#fff;touch-action:none"></canvas><div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-g" style="flex:1" onclick="saveSig()">Übernehmen</button><button class="btn btn-o" onclick="clearSig()">Löschen</button><button class="btn btn-o" onclick="closeSig()">Abbrechen</button></div></div>';
  document.body.appendChild(ov);
  _sigCanvas=document.getElementById('sigcanvas');
  _sigC2d=_sigCanvas.getContext('2d');
  _sigC2d.strokeStyle='#1e1a14';_sigC2d.lineWidth=2.5;_sigC2d.lineCap='round';_sigC2d.lineJoin='round';
  // Pointer events (funktioniert für Maus + Touch + Stift)
  function pos(e){var r=_sigCanvas.getBoundingClientRect();var sx=_sigCanvas.width/r.width,sy=_sigCanvas.height/r.height;
    var cx=(e.touches?e.touches[0].clientX:e.clientX),cy=(e.touches?e.touches[0].clientY:e.clientY);
    return {x:(cx-r.left)*sx,y:(cy-r.top)*sy};}
  function start(e){e.preventDefault();_sigDrawing=true;var p=pos(e);_sigC2d.beginPath();_sigC2d.moveTo(p.x,p.y);}
  function move(e){if(!_sigDrawing)return;e.preventDefault();var p=pos(e);_sigC2d.lineTo(p.x,p.y);_sigC2d.stroke();}
  function end(e){_sigDrawing=false;}
  _sigCanvas.addEventListener('mousedown',start);_sigCanvas.addEventListener('mousemove',move);_sigCanvas.addEventListener('mouseup',end);
  _sigCanvas.addEventListener('touchstart',start);_sigCanvas.addEventListener('touchmove',move);_sigCanvas.addEventListener('touchend',end);
}
function clearSig(){if(_sigC2d&&_sigCanvas)_sigC2d.clearRect(0,0,_sigCanvas.width,_sigCanvas.height);}
function closeSig(){var m=document.getElementById('sigmodal');if(m)m.remove();_sigCtx=null;}
function saveSig(){
  var a=A();if(!a||!_sigCanvas){closeSig();return;}
  // Prüfen ob etwas gezeichnet wurde
  var blank=document.createElement('canvas');blank.width=_sigCanvas.width;blank.height=_sigCanvas.height;
  if(_sigCanvas.toDataURL()===blank.toDataURL()){nf('⚠️ Keine Unterschrift');return;}
  var dataUrl=_sigCanvas.toDataURL('image/png');
  if(!a.signatures)a.signatures={};
  a.signatures[_sigCtx]={img:dataUrl,date:td()};
  try{stampBA();}catch(e){}
  sv();closeSig();render();
  nf('✍️ Unterschrift gespeichert');
}
function rmSig(which){
  var a=A();if(!a||!a.signatures)return;
  delete a.signatures[which];
  try{stampBA();}catch(e){}
  sv();render();
}
